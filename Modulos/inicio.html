<h4 class="fw-bold mb-4" style="color: #2b3445;">Resumen de Actividad</h4>
<div class="row g-3 mb-4">
    <div class="col-12 col-md-6 col-xl-3">
        <div class="dashboard-card h-100">
            <div class="dashboard-icon" style="background-color: #fef3c7; color: #d97706;"><i
                    class="bi bi-list-task"></i></div>
            <div>
                <h3 class="mb-0 fw-bold">11</h3>
                <div class="text-muted small">Total Tareas</div>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
        <div class="dashboard-card h-100">
            <div class="dashboard-icon" style="background-color: #eff6ff; color: #2563eb;"><i
                    class="bi bi-arrow-repeat"></i></div>
            <div>
                <h3 class="mb-0 fw-bold">3</h3>
                <div class="text-muted small">En Progreso</div>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
        <div class="dashboard-card h-100">
            <div class="dashboard-icon" style="background-color: #dcfce7; color: #16a34a;"><i
                    class="bi bi-check-circle"></i></div>
            <div>
                <h3 class="mb-0 fw-bold">2</h3>
                <div class="text-muted small">Completadas</div>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
        <div class="dashboard-card h-100">
            <div class="dashboard-icon" style="background-color: #fee2e2; color: #dc2626;"><i
                    class="bi bi-exclamation-triangle"></i></div>
            <div>
                <h3 class="mb-0 fw-bold">0</h3>
                <div class="text-muted small">Retrasadas</div>
            </div>
        </div>
    </div>
</div>

<h5 class="fw-bold mb-3" style="color: #2b3445;">Actividad Reciente</h5>
<div class="bg-white border rounded-3 shadow-sm">
    <div class="d-flex align-items-center p-3 border-bottom">
        <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
            style="width: 42px; height: 42px; background-color: #ecfdf5; color: #059669;">
            <i class="bi bi-check2-circle fs-5"></i>
        </div>
        <div>
            <div class="fw-bold text-dark" style="font-size: 0.95rem;">Completaste la "Tarea A"</div>
            <div class="text-muted" style="font-size: 0.8rem;">Hace 2 horas · Proyecto x</div>
        </div>
    </div>
    <div class="d-flex align-items-center p-3 border-bottom">
        <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
            style="width: 42px; height: 42px; background-color: #eff6ff; color: #2563eb;">
            <i class="bi bi-chat-dots fs-5"></i>
        </div>
        <div>
            <div class="fw-bold text-dark" style="font-size: 0.95rem;">Nuevo comentario en "Tarea y"</div>
            <div class="text-muted" style="font-size: 0.8rem;">Hace 5 horas · Proyecto y</div>
        </div>
    </div>
    <div class="d-flex align-items-center p-3">
        <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
            style="width: 42px; height: 42px; background-color: #fef3c7; color: #d97706;">
            <i class="bi bi-file-earmark-plus fs-5"></i>
        </div>
        <div>
            <div class="fw-bold text-dark" style="font-size: 0.95rem;">Creaste "Proyecto z"</div>
            <div class="text-muted" style="font-size: 0.8rem;">Ayer a las 14:30</div>
        </div>
    </div>
</div>
