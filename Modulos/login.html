<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/login.css">
    <title>UTPManager - LogIn</title>
</head>

<body>

    <div id="g_id_onload" data-client_id="706301212604-ii1ied34iv703c6h2osgmudhlp6g8g35.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup" data-callback="manejarRespuestaGoogle">
    </div>

    <canvas id="canvas-burbujas"></canvas>

    <div class="container-fluid  ">
        <div class="row">
            <div class="col-7 d-none d-md-block min-vh-100 contenido1">
                <div class="bienvenida d-flex flex-column justify-content-center ">
                    <div class="logo-img">
                        <img src="../resources/UTPManager.png" alt="" height="60">
                    </div>
                    <div class="titulo">
                        <h1>Bienvenido a UTPManager</h1>

                    </div>
                    <div class="texto">
                        Lista para ayudarte a organizar tu vida y potenciar tu crecimiento personal y
                        profesional.</p>
                    </div>
                </div>

            </div>

            <div
                class="contenido2 col-lg-5 col-sm-12 col-xs-12 min-vh-100 d-flex justify-content-center align-items-center">

                <input type="checkbox" id="flip-toggle" hidden>

                <div class="card-3d-wrap">
                    <div class="card-3d-wrapper">
                        <div class="carta-back">
                            <div class="login-header">
                                <h2 class="text-center fw-bold mt-2 mb-4 fs-3">Registrarse</h2>
                            </div>

                            <form class="form-contenedor d-flex flex-column justify-content-center">

                                <div class="contenedor-google">

                                    <div class="g_id_signin" data-type="standard" data-shape="pill"
                                        data-theme="filled_black" data-text="continue_with" data-size="large"
                                        data-logo_alignment="left">
                                    </div>
                                </div>
                                <div class="separator position-relative">
                                    <p class="position-absolute">o</p>
                                </div>
                                <div class="inputs-contenedor d-flex flex-column gap-1">
                                    <label class="form-label" for="email-registro"> Email o Nombre de usuario
                                        <input type="text" class="form-control" id="email-registro"
                                            name="nombre-usuario-registro" required>
                                    </label>
                                    <label class="form-label" for="password-registro"> Contraseña
                                        <input type="password" class="form-control" id="password-registro"
                                            name="password-usuario-registro" required>
                                    </label>
                                    <button class="btn btn-summit btn-secondary"
                                        onclick="valiarRegistroUsaario(event)">Registrarse</button>
                                </div>
                                <div class="info-form text-center mb-3 mt-2">
                                    <input type="checkbox" id="flip-toggle" hidden>
                                    <label for="flip-toggle" class="cambio-card">¿ Ya tienes una cuenta
                                        ?</label>
                                </div>

                                <div class="tyc">
                                    Al registrate aceptas nuestros <a href="#">Terminos</a> y <a
                                        href="#">condiciones</a>
                                </div>

                            </form>

                        </div>


                        <div class="carta-front">
                            <div class="login-header">
                                <h2 class="text-center fw-bold mt-2 mb-4 fs-3">Iniciar sesión</h2>
                            </div>

                            <form class="form-contenedor d-flex flex-column justify-content-center">

                                <div class="contenedor-google">


                                    <div class="g_id_signin txt-google" data-type="standard" data-shape="pill"
                                        data-theme="filled_black" data-text="continue_with" data-size="large"
                                        data-logo_alignment="left">
                                    </div>
                                </div>
                                <div class="separator position-relative">
                                    <p class="position-absolute">o</p>
                                </div>
                                <div class="inputs-contenedor d-flex flex-column gap-1">
                                    <label class="form-label" for="email-login">Nombre de usuario
                                        <input type="text" class="form-control" id="email-login"
                                            name="nombre-usuario-login" required>
                                    </label>
                                    <label class="form-label" for="password-login">Contraseña
                                        <input type="password" class="form-control" id="password-login"
                                            name="password-usuario-login" required>
                                    </label>
                                    <button class="btn btn-summit btn-secondary"
                                        onclick="validarLoginTemporal(event)">Iniciar sesión</button>
                                </div>
                                <div class="info-form text-center mb-2">

                                    <label for="flip-toggle" class="cambio-card">¿ Aún no tienes una cuenta ?</label>
                                </div>
                                <div class="tyc">
                                    Al iniciar aceptas nuestros <a href="#">Terminos</a> y <a href="#">condiciones</a>
                                </div>

                            </form>

                        </div>

                    </div>
                </div>

            </div>
        </div>


    </div>

    <footer class="container-fluid bg-black p-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../JS/login.js"></script>
</body>

</html>
