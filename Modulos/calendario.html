<div class="d-flex flex-wrap gap-2 mb-3">
    <span class="badge rounded-pill px-3 py-2" style="background:#fee2e2;color:#be123c;font-size:.72rem;"><i
            class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Prioridad Alta</span>
    <span class="badge rounded-pill px-3 py-2" style="background:#fef9c3;color:#a16207;font-size:.72rem;"><i
            class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Prioridad Media</span>
    <span class="badge rounded-pill px-3 py-2" style="background:#dcfce7;color:#15803d;font-size:.72rem;"><i
            class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Prioridad Baja</span>
    <span class="badge rounded-pill px-3 py-2" style="background:#f3e8ff;color:#7e22ce;font-size:.72rem;"><i
            class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Evento Propio</span>
</div>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <h2 class="fw-bold mb-0" id="calendarTitle" style="font-size:1.5rem;"></h2>
        <p class="text-muted mb-0" style="font-size:.8rem;">
            <span class="text-muted">Workspace</span> <span class="mx-1">/</span> <span
                class="fw-bold text-primary">Calendario Academico 2026</span>
        </p>
    </div>
    <div class="d-flex gap-2 align-items-center flex-wrap">
        <button class="btn btn-sm px-3 rounded-pill fw-bold bg-white border" id="btnHoy">Hoy</button>
        <div class="btn-group shadow-sm">
            <button class="btn btn-sm btn-light border" id="btnPrev"><i class="bi bi-chevron-left"></i></button>
            <button class="btn btn-sm btn-light border" id="btnNext"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="d-flex gap-1">
            <button class="btn btn-sm px-3 rounded-pill fw-bold text-white bg-primary border-0" id="btnMes">Mes</button>
            <button class="btn btn-sm px-3 rounded-pill fw-bold bg-white border text-secondary"
                id="btnSemana">Semana</button>
        </div>
        <button class="btn btn-sm px-4 rounded-pill fw-bold text-white bg-primary border-0" data-bs-toggle="modal"
            data-bs-target="#newTaskModal">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Evento
        </button>
    </div>
</div>

<div id="vistasMes" class="table-responsive rounded-3 shadow-sm">
    <table class="calendar-table table-bordered">
        <thead>
            <tr>
                <th>Lunes</th>
                <th>Martes</th>
                <th>Miercoles</th>
                <th>Jueves</th>
                <th>Viernes</th>
                <th>Sabado</th>
                <th>Domingo</th>
            </tr>
        </thead>
        <tbody id="monthBody"></tbody>
    </table>
</div>

<div id="vistaSemana" class="table-responsive rounded-3 shadow-sm" style="display:none;">
    <table class="calendar-table table-bordered">
        <thead>
            <tr>
                <th style="width:72px;">Hora</th>
                <th>Lunes<br /><small id="wDay0" class="fw-normal text-muted"></small></th>
                <th>Martes<br /><small id="wDay1" class="fw-normal text-muted"></small></th>
                <th>Miercoles<br /><small id="wDay2" class="fw-normal text-muted"></small></th>
                <th>Jueves<br /><small id="wDay3" class="fw-normal text-muted"></small></th>
                <th>Viernes<br /><small id="wDay4" class="fw-normal text-muted"></small></th>
                <th>Sabado<br /><small id="wDay5" class="fw-normal text-muted"></small></th>
                <th>Domingo<br /><small id="wDay6" class="fw-normal text-muted"></small></th>
            </tr>
        </thead>
        <tbody id="weekBody"></tbody>
    </table>
</div>

<div class="modal fade" id="newTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header bg-dark text-white" style="border-radius:16px 16px 0 0;border:none;">
                <h5 class="modal-title fw-bold"><i class="bi bi-calendar-plus me-2"></i>Nuevo Evento</h5>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="eventForm">
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control shadow-none rounded-3" id="eventName"
                            placeholder="Titulo" required />
                        <label for="eventName">Titulo del evento</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <select class="form-select shadow-none rounded-3" id="eventProject">
                            <option value="alta">Alta</option>
                            <option value="media" selected>Media</option>
                            <option value="baja">Baja</option>
                            <option value="own">Evento Propio</option>
                        </select>
                        <label for="eventProject">Prioridad</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <input type="date" class="form-control shadow-none rounded-3" id="eventDate" required />
                        <label for="eventDate">Fecha</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <textarea class="form-control shadow-none rounded-3" id="eventDescription"
                            placeholder="Descripcion" style="height:75px;"></textarea>
                        <label for="eventDescription">Descripcion (opcional)</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
                <button type="button" class="btn btn-light rounded-pill px-4 fw-bold"
                    data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="eventForm" class="btn btn-primary rounded-pill px-4 fw-bold text-white"><i
                        class="bi bi-floppy me-1"></i>Guardar Evento</button>
            </div>
        </div>
    </div>
</div>
